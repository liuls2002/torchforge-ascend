# Grouped Relative Policy Optimization (GRPO)
# >>> python -m apps.grpo.main --config apps/grpo/qwen3_1_7b.yaml
#
# Trainer/ref_model: see qwen3_8b.yaml header (ForgeEngine.Config layout).

group_size: 8
local_batch_size: 2
global_batch_size: 32
max_req_tokens: 1024
max_res_tokens: 1024
# model: "Qwen/Qwen3-1.7B"
model: "/ssd/liuls/data/hub/Qwen3-1.7B"
off_by_n: 1
compile: true

rollout_threads: 4
dp_size: 2

metric_logging:
  wandb:
    project: grpo-training
    group: grpo_exp_${oc.env:USER,default_user}
    logging_mode: global_reduce
  console:
    logging_mode: global_reduce

dataset:
  path: "openai/gsm8k"
  revision: "main"
  data_split: "train"
  streaming: true
  model: ${model}

generator:
  engine_args:
    model: ${model}
    tensor_parallel_size: 1
    pipeline_parallel_size: 1
    enforce_eager: ${not:${compile}}
  sampling_params:
    n: ${group_size}
    max_tokens: ${max_res_tokens}
    temperature: 1.0
    top_p: 1.0
    logprobs: 1

trainer:
  dump_folder: "."
  model:
    name: qwen3
    flavor: 1.7B
    hf_assets_path: ${model}
  optimizer:
    name: AdamW
    lr: 1e-5
    eps: 1e-8
  lr_scheduler:
    warmup_steps: 1
  training:
    local_batch_size: ${local_batch_size}
    # ForgeEngine + replay_buffer: ga = global_batch_size / (local_batch_size * dp_ranks); -1 => ga=1
    global_batch_size: ${global_batch_size}
    seq_len: ${sum:${max_req_tokens},${max_res_tokens}}
    max_norm: 1.0
    steps: 10
    dtype: bfloat16
    gc_freq: 1
  compile:
    enable: ${compile}
  parallelism:
    data_parallel_replicate_degree: ${dp_size}
    data_parallel_shard_degree: 1
    tensor_parallel_degree: 1
    pipeline_parallel_degree: 1
    context_parallel_degree: 1
    expert_parallel_degree: 1
    disable_loss_parallel: true
  checkpoint:
    enable: true
    folder: ./checkpoint
    initial_load_path: ${model}
    initial_load_in_hf: true
    last_save_in_hf: true
    interval: 500
    async_mode: "disabled"
  activation_checkpoint:
    mode: selective
  comm:
    trace_buf_size: 0

replay_buffer:
  batch_size: ${local_batch_size}
  max_policy_age: ${off_by_n}
  # Align with TitanTrainer DP rank count (sample/collate returns one batch slice per process).
  dp_size: ${actors.trainer.procs}
  global_batch_size: ${trainer.training.global_batch_size}

ref_model:
  dump_folder: "."
  model:
    name: qwen3
    flavor: 1.7B
    hf_assets_path: ${model}
  training:
    seq_len: ${trainer.training.seq_len}
    dtype: bfloat16
    gc_freq: 1
  compile:
    enable: ${compile}
  parallelism:
    data_parallel_replicate_degree: ${dp_size}
    data_parallel_shard_degree: 1
    tensor_parallel_degree: 1
    pipeline_parallel_degree: 1
    context_parallel_degree: 1
    expert_parallel_degree: 1
  checkpoint:
    enable: true
    initial_load_path: ${model}
    initial_load_in_hf: true
  comm:
    trace_buf_size: 0

services:
  generator:
    procs: ${generator.engine_args.tensor_parallel_size}
    num_replicas: ${rollout_threads}
    mesh_name: generator
    with_gpus: true
  reward_actor:
    procs: 1
    num_replicas: 1
    mesh_name: reward_actor
    with_gpus: false

actors:
  dataset:
    procs: 1
    with_gpus: false
    mesh_name: dataset
  trainer:
    procs: ${dp_size}
    with_gpus: true
    mesh_name: trainer
  replay_buffer:
    procs: 1
    with_gpus: false
    mesh_name: replay_buffer
  compute_advantages:
    procs: 1
    with_gpus: false
    mesh_name: compute_advantages
