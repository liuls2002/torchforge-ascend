# >>> python -m apps.sft.main --config apps/sft/qwen3_4b.yaml
#
# Layout matches torchtitan ForgeEngine.Config (see qwen3_8b.yaml header).

comm:
  trace_buf_size: 0

model_name: "/ssd/liuls/data/hub/Qwen3-4B-Instruct-2507"

dump_folder: "."

compile:
  enable: false

model:
  name: qwen3
  flavor: 4B
  hf_assets_path: ${model_name}

processes:
  procs: 4
  with_gpus: true

optimizer:
  name: AdamW
  lr: 1e-5
  eps: 1e-8

lr_scheduler:
  warmup_steps: 200

training:
  local_batch_size: 2
  seq_len: 2048
  max_norm: 1.0
  steps: 1000
  datasets:
    - path: "yahma/alpaca-cleaned"
      split: "train[:95%]"

eval:
  eval_every_n_steps: 50  # null = disabled
  max_eval_steps: null    # null = run until epoch completes
  datasets:
      - path: "yahma/alpaca-cleaned"
        split: "train[95%:]"

parallelism:
  data_parallel_replicate_degree: 1
  data_parallel_shard_degree: -1
  tensor_parallel_degree: 1
  pipeline_parallel_degree: 1
  context_parallel_degree: 1
  expert_parallel_degree: 1
  disable_loss_parallel: false

checkpoint:
  enable: true
  folder: ./checkpoint_qwen3_4b
  initial_load_path: ${model_name}
  initial_load_in_hf: true
  last_save_in_hf: true
  interval: 500
  async_mode: "disabled"

activation_checkpoint:
  mode: selective

metric_logging:
  wandb:
    project: sft-training
    group: sft_exp_${oc.env:USER,default_user}
    logging_mode: global_reduce # global_reduce, per_rank_reduce, per_rank_no_reduce
